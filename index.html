<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker</title>
    <style>
        /* Mobile-First Styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            color: #222;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
            background: #fff;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
        }
        button.add-btn {
            background-color: #007bff;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 5px;
            margin-bottom: 20px;
        }
        button.add-btn:active {
            background-color: #0056b3;
        }
        button.delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            width: auto;
            margin: 0;
            font-weight: bold;
        }
        button.delete-btn:active {
            background-color: #a71d2a;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .row:last-child {
            border-bottom: none;
        }
        .log-row {
            font-size: 0.9rem;
            background: #fafafa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #eee;
        }
        .log-details {
            display: flex;
            flex-direction: column;
        }
        .log-date {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
        }
        .total-row {
            font-weight: bold;
            font-size: 1.1rem;
            border-top: 2px solid #eee;
            padding-top: 10px;
            margin-top: 5px;
        }
        .empty-state {
            color: #888;
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .section-spacer {
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add Expense</h2>
        <input type="number" id="amount" placeholder="Amount ($)" step="0.01" inputmode="decimal">
        <select id="category">
            <option value="Fast Food">Fast Food</option>
            <option value="Grocery">Grocery</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Misc">Misc</option>
        </select>
        <button class="add-btn" onclick="addExpense()">Add to Total</button>

        <h2>Recent Transactions</h2>
        <div id="recent-logs">
            </div>

        <h2 class="section-spacer">This Month's Breakdown</h2>
        <div id="monthly-summary">
            </div>

        <h2 class="section-spacer">Past 12 Months</h2>
        <div id="yearly-summary">
            </div>
    </div>

    <script>
        const STORAGE_KEY = 'mobile_expense_data';
        const HISTORY_KEY = 'mobile_expense_history';

        // Retrieve monthly aggregate data
        function loadData() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        }

        // Save monthly aggregate data
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Retrieve transaction history
        function loadHistory() {
            return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        }

        // Save transaction history
        function saveHistory(history) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        // Get current month in YYYY-MM format
        function getCurrentMonthKey() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        }

        // Enforce the 12-month rolling limit
        function enforce12MonthLimit(data) {
            const months = Object.keys(data).sort();
            if (months.length > 12) {
                const excess = months.length - 12;
                for (let i = 0; i < excess; i++) {
                    delete data[months[i]];
                }
            }
            return data;
        }

        // Add a new expense
        function addExpense() {
            const amountInput = document.getElementById('amount');
            const categoryInput = document.getElementById('category');
            
            const amount = parseFloat(amountInput.value);
            const category = categoryInput.value;

            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid positive amount.");
                return;
            }

            let data = loadData();
            let history = loadHistory();
            let monthKey = getCurrentMonthKey();

            // 1. Save to Monthly Aggregates
            if (!data[monthKey]) data[monthKey] = {};
            if (!data[monthKey][category]) data[monthKey][category] = 0;
            data[monthKey][category] += amount;

            data = enforce12MonthLimit(data);
            saveData(data);

            // 2. Save to Transaction History (with unique ID)
            const newLog = {
                id: Date.now(),
                month: monthKey,
                category: category,
                amount: amount,
                dateStr: new Date().toLocaleString()
            };
            
            history.unshift(newLog); // Add to beginning of array
            if (history.length > 20) history.pop(); // Only keep the last 20 logs to save space
            saveHistory(history);

            // Reset input and refresh UI
            amountInput.value = '';
            updateUI();
        }

        // Delete a specific expense
        function deleteExpense(id) {
            let history = loadHistory();
            let data = loadData();

            // Find the item to delete
            const logIndex = history.findIndex(item => item.id === id);
            
            if (logIndex > -1) {
                const log = history[logIndex];
                
                // 1. Subtract from monthly aggregate
                if (data[log.month] && data[log.month][log.category]) {
                    data[log.month][log.category] -= log.amount;
                    
                    // Clean up floating point math errors and empty categories
                    if (data[log.month][log.category] <= 0.01) {
                        delete data[log.month][log.category];
                    }
                }
                
                // 2. Remove from history array
                history.splice(logIndex, 1);
                
                // Save updates
                saveData(data);
                saveHistory(history);
                updateUI();
            }
        }

        // Render the UI
        function updateUI() {
            const data = loadData();
            const history = loadHistory();
            const currentMonthKey = getCurrentMonthKey();

            // --- Render Recent Logs ---
            const logsDiv = document.getElementById('recent-logs');
            logsDiv.innerHTML = '';

            if (history.length === 0) {
                logsDiv.innerHTML = '<div class="empty-state">No recent transactions.</div>';
            } else {
                history.forEach(log => {
                    logsDiv.innerHTML += `
                        <div class="row log-row">
                            <div class="log-details">
                                <strong>${log.category}: $${log.amount.toFixed(2)}</strong>
                                <span class="log-date">${log.dateStr}</span>
                            </div>
                            <button class="delete-btn" onclick="deleteExpense(${log.id})">Delete</button>
                        </div>
                    `;
                });
            }

            // --- Render Current Month ---
            const monthlyDiv = document.getElementById('monthly-summary');
            monthlyDiv.innerHTML = '';
            let currentMonthTotal = 0;

            if (data[currentMonthKey] && Object.keys(data[currentMonthKey]).length > 0) {
                for (const [cat, amt] of Object.entries(data[currentMonthKey])) {
                    monthlyDiv.innerHTML += `<div class="row"><span>${cat}</span><span>$${amt.toFixed(2)}</span></div>`;
                    currentMonthTotal += amt;
                }
                monthlyDiv.innerHTML += `<div class="row total-row"><span>Total</span><span>$${currentMonthTotal.toFixed(2)}</span></div>`;
            } else {
                monthlyDiv.innerHTML = '<div class="empty-state">No expenses logged yet this month.</div>';
            }

            // --- Render Past 12 Months ---
            const yearlyDiv = document.getElementById('yearly-summary');
            yearlyDiv.innerHTML = '';
            
            const sortedMonths = Object.keys(data).sort().reverse();

            if (sortedMonths.length === 0) {
                yearlyDiv.innerHTML = '<div class="empty-state">No historical data yet.</div>';
            } else {
                sortedMonths.forEach(month => {
                    let monthTotal = 0;
                    for (const amt of Object.values(data[month])) {
                        monthTotal += amt;
                    }
                    if (monthTotal > 0.01) { // Only show months with actual totals
                        yearlyDiv.innerHTML += `<div class="row"><span>${month}</span><span>$${monthTotal.toFixed(2)}</span></div>`;
                    }
                });
            }
        }

        // Initialize UI
        updateUI();
    </script>
</body>
</html>
