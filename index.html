<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker</title>
    <style>
        /* Mobile-First Styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            color: #222;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
            background: #fff;
            appearance: auto;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
        }
        button.add-btn {
            background-color: #007bff;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 5px;
            margin-bottom: 20px;
        }
        button.add-btn:active {
            background-color: #0056b3;
        }
        button.budget-btn {
            background-color: #28a745;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 5px;
            margin-bottom: 20px;
        }
        button.budget-btn:active {
            background-color: #1e7e34;
        }
        button.delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            width: auto;
            margin: 0;
            font-weight: bold;
        }
        button.delete-btn:active {
            background-color: #a71d2a;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .row:last-child {
            border-bottom: none;
        }
        .breakdown-item {
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .breakdown-header {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
        }
        .budget-details {
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
        }
        .over-budget {
            color: #dc3545;
            font-weight: bold;
        }
        .under-budget {
            color: #28a745;
        }
        .log-row {
            font-size: 0.9rem;
            background: #fafafa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #eee;
        }
        .log-details {
            display: flex;
            flex-direction: column;
        }
        .log-date {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
        }
        .total-row {
            font-weight: bold;
            font-size: 1.1rem;
            border-top: 2px solid #eee;
            padding-top: 10px;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
        }
        .empty-state {
            color: #888;
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .section-spacer {
            margin-top: 35px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add Expense</h2>
        <input type="number" id="amount" placeholder="Amount ($)" step="0.01" inputmode="decimal">
        <select id="category"></select>
        <button class="add-btn" onclick="addExpense()">Add to Total</button>

        <h2 class="section-spacer">This Month's Breakdown</h2>
        <div id="monthly-summary">
            <!-- Populated by JS -->
        </div>

        <h2 class="section-spacer">Recent Transactions</h2>
        <div id="recent-logs">
            <!-- Populated by JS -->
        </div>

        <h2 class="section-spacer">Set Monthly Budgets</h2>
        <!-- Added onchange event listener here -->
        <select id="budget-category" onchange="updateBudgetInput()"></select>
        <input type="number" id="budget-amount" placeholder="Limit ($) - Leave blank to remove" step="0.01" inputmode="decimal">
        <button class="budget-btn" onclick="setBudget()">Set Budget</button>

        <h2 class="section-spacer">Past 12 Months</h2>
        <div id="yearly-summary">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'mobile_expense_data';
        const HISTORY_KEY = 'mobile_expense_history';
        const BUDGETS_KEY = 'mobile_expense_budgets';

        const CATEGORIES = [
            "Bills", "Dining Out", "Entertainment", "Fast Food", "Gas", 
            "Gifts", "Grocery", "Health/Medical", "Insurance", "Misc", 
            "Online Shopping", "Personal Care", "Subscriptions", 
            "Travel/Transit", "Vehicle Maintenance"
        ];

        function populateCategories() {
            const expenseSelect = document.getElementById('category');
            const budgetSelect = document.getElementById('budget-category');
            
            CATEGORIES.forEach(cat => {
                let option1 = new Option(cat, cat);
                let option2 = new Option(cat, cat);
                expenseSelect.add(option1);
                budgetSelect.add(option2);
            });

            // Automatically check if the first item has a budget when the page loads
            updateBudgetInput();
        }

        function loadData() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        
        function loadHistory() { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
        function saveHistory(history) { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }
        
        function loadBudgets() { return JSON.parse(localStorage.getItem(BUDGETS_KEY)) || {}; }
        function saveBudgets(budgets) { localStorage.setItem(BUDGETS_KEY, JSON.stringify(budgets)); }

        function getCurrentMonthKey() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        }

        function enforce12MonthLimit(data) {
            const months = Object.keys(data).sort();
            if (months.length > 12) {
                const excess = months.length - 12;
                for (let i = 0; i < excess; i++) delete data[months[i]];
            }
            return data;
        }

        // --- New Function: Update Budget Input Box ---
        function updateBudgetInput() {
            const category = document.getElementById('budget-category').value;
            const budgets = loadBudgets();
            const amountInput = document.getElementById('budget-amount');
            
            // If a budget exists for this category, show it. Otherwise, clear the box.
            if (budgets[category]) {
                amountInput.value = budgets[category];
            } else {
                amountInput.value = '';
            }
        }

        function addExpense() {
            const amountInput = document.getElementById('amount');
            const categoryInput = document.getElementById('category');
            const amount = parseFloat(amountInput.value);
            const category = categoryInput.value;

            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid positive amount.");
                return;
            }

            let data = loadData();
            let history = loadHistory();
            let monthKey = getCurrentMonthKey();

            if (!data[monthKey]) data[monthKey] = {};
            if (!data[monthKey][category]) data[monthKey][category] = 0;
            data[monthKey][category] += amount;

            data = enforce12MonthLimit(data);
            saveData(data);

            const newLog = {
                id: Date.now(),
                month: monthKey,
                category: category,
                amount: amount,
                dateStr: new Date().toLocaleString()
            };
            
            history.unshift(newLog);
            if (history.length > 20) history.pop();
            saveHistory(history);

            amountInput.value = '';
            updateUI();
        }

        function deleteExpense(id) {
            let history = loadHistory();
            let data = loadData();
            const logIndex = history.findIndex(item => item.id === id);
            
            if (logIndex > -1) {
                const log = history[logIndex];
                if (data[log.month] && data[log.month][log.category]) {
                    data[log.month][log.category] -= log.amount;
                    if (data[log.month][log.category] <= 0.01) {
                        delete data[log.month][log.category];
                    }
                }
                history.splice(logIndex, 1);
                saveData(data);
                saveHistory(history);
                updateUI();
            }
        }

        function setBudget() {
            const category = document.getElementById('budget-category').value;
            const amountInput = document.getElementById('budget-amount');
            const amount = parseFloat(amountInput.value);
            
            let budgets = loadBudgets();

            if (isNaN(amount) || amount <= 0) {
                delete budgets[category];
                alert(`${category} budget removed.`);
            } else {
                budgets[category] = amount;
                alert(`${category} budget set to $${amount.toFixed(2)}.`);
            }

            saveBudgets(budgets);
            
            // Refresh the input box to show the newly saved state
            updateBudgetInput(); 
            updateUI();
        }

        function updateUI() {
            const data = loadData();
            const history = loadHistory();
            const budgets = loadBudgets();
            const currentMonthKey = getCurrentMonthKey();

            const monthlyDiv = document.getElementById('monthly-summary');
            monthlyDiv.innerHTML = '';
            let currentMonthTotal = 0;

            if (data[currentMonthKey] && Object.keys(data[currentMonthKey]).length > 0) {
                for (const [cat, amt] of Object.entries(data[currentMonthKey])) {
                    currentMonthTotal += amt;
                    
                    if (budgets[cat]) {
                        const budgetLimit = budgets[cat];
                        const remaining = budgetLimit - amt;
                        const isOver = remaining < 0;
                        const amtClass = isOver ? 'over-budget' : '';
                        const statusText = isOver ? `Over: $${Math.abs(remaining).toFixed(2)}` : `Left: $${remaining.toFixed(2)}`;
                        const statusClass = isOver ? 'over-budget' : 'under-budget';

                        monthlyDiv.innerHTML += `
                            <div class="breakdown-item">
                                <div class="breakdown-header">
                                    <span>${cat}</span>
                                    <span class="${amtClass}">$${amt.toFixed(2)}</span>
                                </div>
                                <div class="budget-details">
                                    <span>Budget: $${budgetLimit.toFixed(2)}</span>
                                    <span class="${statusClass}">${statusText}</span>
                                </div>
                            </div>
                        `;
                    } else {
                        monthlyDiv.innerHTML += `
                            <div class="breakdown-item">
                                <div class="breakdown-header">
                                    <span>${cat}</span>
                                    <span>$${amt.toFixed(2)}</span>
                                </div>
                            </div>
                        `;
                    }
                }
                monthlyDiv.innerHTML += `<div class="total-row"><span>Total Spent</span><span>$${currentMonthTotal.toFixed(2)}</span></div>`;
            } else {
                monthlyDiv.innerHTML = '<div class="empty-state">No expenses logged yet this month.</div>';
            }

            const logsDiv = document.getElementById('recent-logs');
            logsDiv.innerHTML = '';
            if (history.length === 0) {
                logsDiv.innerHTML = '<div class="empty-state">No recent transactions.</div>';
            } else {
                history.forEach(log => {
                    logsDiv.innerHTML += `
                        <div class="row log-row">
                            <div class="log-details">
                                <strong>${log.category}: $${log.amount.toFixed(2)}</strong>
                                <span class="log-date">${log.dateStr}</span>
                            </div>
                            <button class="delete-btn" onclick="deleteExpense(${log.id})">Delete</button>
                        </div>
                    `;
                });
            }

            const yearlyDiv = document.getElementById('yearly-summary');
            yearlyDiv.innerHTML = '';
            const sortedMonths = Object.keys(data).sort().reverse();

            if (sortedMonths.length === 0) {
                yearlyDiv.innerHTML = '<div class="empty-state">No historical data yet.</div>';
            } else {
                sortedMonths.forEach(month => {
                    let monthTotal = 0;
                    for (const amt of Object.values(data[month])) {
                        monthTotal += amt;
                    }
                    if (monthTotal > 0.01) {
                        yearlyDiv.innerHTML += `<div class="row"><span>${month}</span><span>$${monthTotal.toFixed(2)}</span></div>`;
                    }
                });
            }
        }

        populateCategories();
        updateUI();
    </script>
</body>
</html>
